services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shophub
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: shophub
      MYSQL_PASSWORD: shophub
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./back-end
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ShopHub
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: shophub
      DB_USERNAME: shophub
      DB_PASSWORD: shophub
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: log
      FRONTEND_URL: http://localhost:5173
      SANCTUM_STATEFUL_DOMAINS: localhost:5173
      DEMO_MODE: "true"
      DEMO_ADMIN_EMAIL: admin@shophub.test
      DEMO_ADMIN_PASSWORD: password
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend-storage:/var/www/html/storage

  frontend:
    build:
      context: ./front-end
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  mysql-data:
  backend-storage:
